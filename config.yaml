kinesis:
  region: "us-east-1"
  batch_size: 5000
  poll_interval_active: 1.0   # 有数据时的拉取间隔（秒）
  poll_interval_idle: 30.0    # 无数据时的拉取间隔（秒）
  shard_refresh_interval: 60  # shard 列表刷新间隔（秒），扩缩容时自动感知新 shard；Pod 下线后最大空窗期 = lock_ttl + shard_refresh_interval
  # checkpoint 不存在时的初始消费位置：LATEST / TRIM_HORIZON / AT_TIMESTAMP
  initial_position: "TRIM_HORIZON"
  # initial_timestamp: "2026-03-15T10:00:00+00:00"  # AT_TIMESTAMP 时生效
  stream_name: "cloudfront-realtime-logs"

  # 跨账户访问配置（可选）
  # 配置 Access Key 后使用指定凭证访问 Kinesis，不配置则走默认凭证链（EC2 Instance Role / 环境变量）
  # 跨账户时必须配置 stream_arn，因为 StreamName 在跨账户场景下无法定位资源
  # aws_access_key_id: "AKIAxxxxxxxxxxxxxxxx"
  # aws_secret_access_key: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # stream_arn: "arn:aws:kinesis:us-east-1:111111111111:stream/cloudfront-realtime-logs"

doris:
  fe_host: "doris-fe"
  fe_port: 8030
  database: "your_db"
  table: "cloudfront_logs"    # 写入的目标表
  username: "root"
  password: "your_password"
  batch_size: 5000
  flush_interval: 30.0        # 超时强制 flush（秒）；日志量小时数据最多延迟此时间落盘

# Redis 分布式锁 + checkpoint 配置（可选）
# 配置后自动启用分布式模式，多 Pod 动态抢占 shard，支持随时扩缩容
# 不配置则以单实例模式启动（启动时打印 WARNING），此时只允许单 Pod 部署
# 已配置但连接失败时应用直接退出，避免多 Pod 无锁运行导致重复消费
redis:
  host: "redis-host"
  port: 6379
  password: ""                # 无密码留空
  db: 0
  lock_ttl: 30                # shard 锁的 TTL（秒），Pod 崩溃后此时间内锁自动释放；空窗期 = lock_ttl + shard_refresh_interval
  heartbeat_interval: 10.0    # 锁续期心跳间隔（秒），必须小于 lock_ttl / 2，否则锁可能在续期前过期

transform:
  source_fields:
    - timestamp
    - c-ip
    - time-taken
    - sc-status
    - sc-bytes
    - cs-method
    - cs-host
    - cs-uri-stem
    - x-edge-location
    - x-edge-request-id
    - time-to-first-byte
    - cs-user-agent
    - cs-uri-query
    - cs-referer
    - x-edge-result-type
    - x-edge-response-result-type
    - x-edge-detailed-result-type
    - ssl-protocol
    - origin-fbl
    - asn

  target_fields:
    - log_time
    - client_ip
    - status_code
    - method
    - host
    - uri_path
    - uri_query
    - time_taken
    - bytes_sent
    - edge_result
    - edge_location
    - request_id
    - referer
    - user_agent
    - ssl_protocol
    - asn
    - source          # add_fields 新增的固定字段，需在此列出才能作为顶层字段写入
    - extras          # 不在此列表中的字段自动合并到此列，JSON 格式存储

  rename:
    timestamp: log_time
    "c-ip": client_ip
    "sc-status": status_code
    "cs-method": method
    "cs-host": host
    "cs-uri-stem": uri_path
    "cs-uri-query": uri_query
    "time-taken": time_taken
    "sc-bytes": bytes_sent
    "x-edge-result-type": edge_result
    "x-edge-location": edge_location
    "x-edge-request-id": request_id
    "cs-referer": referer
    "cs-user-agent": user_agent
    "ssl-protocol": ssl_protocol

  drop_fields:
    - x-edge-response-result-type
    - x-edge-detailed-result-type

  add_fields:
    source: "literal:cloudfront"
    # env_name: "env:APP_ENV"   # 从环境变量注入

  # 需要 URL 解码的字段（保留原始特殊字符，不做过滤）
  url_decode_fields:
    - uri_query
    - referer
    - user_agent

  # 整数类型字段（rename 后的目标字段名）
  int_fields:
    - status_code
    - bytes_sent
    - asn

  # 浮点类型字段（rename 后的目标字段名；未经 rename 的字段保持原始名）
  # origin-fbl / time-to-first-byte 未配置 rename，以原始名进入 extras，类型转换仍生效
  float_fields:
    - time_taken
    - origin-fbl
    - time-to-first-byte

  # 需要去除查询参数的字段（截取 ? 之前的纯路径，使用 rename 后的目标字段名）
  # cs-uri-stem 经 rename 后为 uri_path，此处填 uri_path
  strip_query_fields:
    - uri_path

  # Cookie 字段提取：从指定源字段解析 cookie 字符串，将指定 key 的值提取为独立字段
  # source_field: 包含 cookie 字符串的字段名（使用 rename 后的目标字段名）
  # mappings: cookie 中的 key → 输出字段名（输出字段名需同步添加到 target_fields 中才能作为顶层字段）
  # url_decode: 是否对提取的 cookie 值做 URL 解码（默认 false）
  # default_value: cookie key 不存在时的默认值（默认 null）
  cookie_fields:
    source_field: "cs-cookie"       # CloudFront 实时日志中的 cookie 字段（rename 后的名称）
    url_decode: true
    default_value: null
    mappings:
      # cookie_key: output_field_name
      # 示例：提取 cookie 中的 user_id 和 session_id
      # user_id: "cookie_user_id"
      # session_id: "cookie_session_id"
